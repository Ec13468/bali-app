<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2563eb">

<script>
  // 啟動離線機器人
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaliVibe Currency - Standalone</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: black;
            color: white;
        }
        [x-cloak] { display: none !important; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lime: {
                            400: '#a3e635',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body x-data="currencyApp()" x-init="init()" class="selection:bg-lime-400 selection:text-black">

    <!-- Header -->
    <header class="border-b-4 border-lime-400 p-6 sticky top-0 bg-black z-50 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-lime-400">BALIVIBE</h1>
            <p class="text-[10px] uppercase tracking-widest opacity-70">Standalone PWA Tool</p>
        </div>
        <div class="flex items-center gap-4">
            <template x-if="isOffline">
                <i data-lucide="wifi-off" class="text-red-500 animate-pulse"></i>
            </template>
            <button 
                @click="fetchRates(true)"
                :disabled="loading"
                class="p-2 border-2 border-lime-400 hover:bg-lime-400 hover:text-black transition-colors active:scale-95 disabled:opacity-50"
            >
                <i data-lucide="refresh-cw" :class="loading ? 'animate-spin' : ''"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8 pb-24">
        
        <!-- IDR Input Section -->
        <section class="space-y-4">
            <div class="flex justify-between items-end">
                <label class="text-xs uppercase font-bold text-lime-400">Amount (IDR in k)</label>
                <span class="text-[10px] opacity-50">100 = 100,000</span>
            </div>
            <div class="relative group">
                <input 
                    type="number" 
                    inputmode="decimal"
                    x-model="idrKInput"
                    class="w-full bg-transparent border-4 border-white p-6 text-5xl font-black focus:border-lime-400 focus:outline-none transition-colors"
                    placeholder="0"
                >
                <div class="absolute right-12 top-1/2 -translate-y-1/2 text-2xl font-bold opacity-30 group-focus-within:opacity-100 group-focus-within:text-lime-400">
                    k
                </div>
                <button 
                    x-show="idrKInput"
                    @click="idrKInput = ''"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-white/50 hover:text-white"
                >
                    ×
                </button>
            </div>
            <div class="text-right text-sm opacity-70 italic">
                ≈ <span x-text="formatCurrency(rawIdr(), 'IDR')"></span>
            </div>
        </section>

        <!-- Tax Selector -->
        <section class="space-y-3">
            <div class="flex items-center gap-2 text-xs uppercase font-bold text-lime-400">
                <i data-lucide="percent" class="w-4 h-4"></i>
                <span>Bali Tax / Service</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <template x-for="opt in taxOptions">
                    <button
                        @click="selectedTax = opt.value"
                        :class="selectedTax === opt.value ? 'bg-lime-400 border-lime-400 text-black' : 'border-white hover:border-lime-400'"
                        class="py-3 border-2 text-xs font-bold transition-all active:scale-95"
                        x-text="opt.label"
                    ></button>
                </template>
            </div>
            <div 
                x-show="selectedTax > 0"
                x-transition
                class="p-3 border-2 border-dashed border-lime-400/50 text-xs flex justify-between"
            >
                <span>Total with Tax:</span>
                <span class="font-bold text-lime-400" x-text="formatCurrency(taxedIdr(), 'IDR')"></span>
            </div>
        </section>

        <!-- Conversions -->
        <section class="space-y-4">
            <div class="flex items-center gap-2 text-xs uppercase font-bold text-lime-400">
                <i data-lucide="arrow-right-left" class="w-4 h-4"></i>
                <span>Conversions</span>
            </div>
            <div class="space-y-3">
                <template x-for="curr in currencies.filter(c => c !== 'IDR')">
                    <div class="border-2 border-white p-4 flex justify-between items-center hover:border-lime-400 transition-colors">
                        <span class="text-xl font-black" x-text="curr"></span>
                        <div class="text-right">
                            <div class="text-2xl font-black text-lime-400" x-text="formatCurrency(convert(curr), curr)"></div>
                            <div class="text-[10px] opacity-50">
                                1 <span x-text="curr"></span> = <span x-text="getOfficialRate(curr)"></span> IDR
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- Shop Comparison -->
        <section class="space-y-4 border-4 border-white p-4 bg-zinc-900">
            <div class="flex items-center gap-2 text-xs uppercase font-bold text-lime-400">
                <i data-lucide="store" class="w-4 h-4"></i>
                <span>Shop Comparison</span>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] opacity-70 uppercase tracking-wider">1. Select Currency:</p>
                <div class="grid grid-cols-4 gap-2">
                    <template x-for="curr in currencies.filter(c => c !== 'IDR')">
                        <button
                            @click="selectedShopCurrency = curr; shopRate = ''"
                            :class="selectedShopCurrency === curr ? 'bg-lime-400 border-lime-400 text-black' : 'border-white/30 text-white/70 hover:border-white'"
                            class="py-2 border-2 text-xs font-bold transition-all"
                            x-text="curr"
                        ></button>
                    </template>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-end">
                    <p class="text-[10px] opacity-70 uppercase tracking-wider">2. Enter shop rate (IDR in k per 1 <span x-text="selectedShopCurrency"></span>):</p>
                    <span class="text-[8px] opacity-50">e.g. 15.8 = 15,800</span>
                </div>
                <div class="relative group">
                    <input 
                        type="number"
                        inputmode="decimal"
                        x-model="shopRate"
                        :placeholder="selectedShopCurrency === 'USD' ? '15.8' : '0.48'"
                        class="w-full bg-black border-2 border-white p-3 pr-12 text-xl font-bold focus:border-lime-400 focus:outline-none"
                    >
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-lg font-bold opacity-30 group-focus-within:opacity-100 group-focus-within:text-lime-400">
                        k
                    </div>
                </div>
            </div>
            
            <div x-show="comparison()" x-transition class="space-y-2 pt-2">
                <div :class="comparison()?.isBetter ? 'bg-green-600' : 'bg-red-600'" class="p-3 text-sm font-bold flex justify-between items-center text-white">
                    <span x-text="comparison()?.isBetter ? 'GOOD DEAL' : 'BAD DEAL'"></span>
                    <span><span x-text="Math.abs(comparison()?.percent || 0).toFixed(2)"></span>% <span x-text="comparison()?.isBetter ? 'more IDR' : 'less IDR'"></span></span>
                </div>
                <p class="text-[10px] opacity-50 italic">
                    Official: <span x-text="getOfficialRate(selectedShopCurrency)"></span> IDR/<span x-text="selectedShopCurrency"></span>
                </p>
            </div>
        </section>

        <!-- Footer Info -->
        <footer class="pt-8 space-y-4 opacity-50 text-[10px] uppercase tracking-widest text-center">
            <div class="flex justify-center items-center gap-2">
                <i data-lucide="info" class="w-3 h-3"></i>
                <span>Rates updated: <span x-text="lastUpdated ? new Date(lastUpdated).toLocaleString() : 'Never'"></span></span>
            </div>
            <p>© 2026 BaliVibe • Standalone HTML Version</p>
        </footer>
    </main>

    <!-- Error Toast -->
    <div 
        x-show="error" 
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="translate-y-full"
        x-transition:enter-end="translate-y-0"
        class="fixed bottom-6 left-6 right-6 bg-red-600 text-white p-4 border-2 border-white flex items-center gap-3 z-[100]"
    >
        <i data-lucide="alert-circle"></i>
        <span class="text-xs font-bold uppercase" x-text="error"></span>
        <button @click="error = null" class="ml-auto text-xs underline">CLOSE</button>
    </div>

    <script>
        function currencyApp() {
            return {
                rates: null,
                lastUpdated: null,
                loading: false,
                error: null,
                idrKInput: '100',
                selectedTax: 0,
                selectedShopCurrency: 'TWD',
                shopRate: '',
                isOffline: !navigator.onLine,
                currencies: ['IDR', 'TWD', 'USD', 'MYR', 'CAD'],
                taxOptions: [
                    { label: 'None', value: 0 },
                    { label: '+10% (PB1)', value: 0.10 },
                    { label: '+21% (Svc+PB1)', value: 0.21 },
                ],
                storageKey: 'bali_vibe_rates_standalone',

                init() {
                    this.fetchRates();
                    window.addEventListener('online', () => this.isOffline = false);
                    window.addEventListener('offline', () => this.isOffline = true);
                    lucide.createIcons();
                    
                    // Re-run icons on Alpine updates
                    this.$watch('loading', () => this.$nextTick(() => lucide.createIcons()));
                    this.$watch('error', () => this.$nextTick(() => lucide.createIcons()));
                },

                rawIdr() {
                    return (parseFloat(this.idrKInput) || 0) * 1000;
                },

                taxedIdr() {
                    return this.rawIdr() * (1 + this.selectedTax);
                },

                async fetchRates(force = false) {
                    this.loading = true;
                    this.error = null;
                    try {
                        if (!force) {
                            const cached = localStorage.getItem(this.storageKey);
                            if (cached) {
                                const parsed = JSON.parse(cached);
                                if (Date.now() - parsed.lastUpdated < 6 * 60 * 60 * 1000) {
                                    this.rates = parsed.rates;
                                    this.lastUpdated = parsed.lastUpdated;
                                    this.loading = false;
                                    return;
                                }
                            }
                        }

                        const response = await fetch('https://open.er-api.com/v6/latest/IDR');
                        if (!response.ok) throw new Error('Fetch failed');
                        const data = await response.json();
                        
                        this.rates = data.rates;
                        this.lastUpdated = Date.now();
                        localStorage.setItem(this.storageKey, JSON.stringify({
                            rates: this.rates,
                            lastUpdated: this.lastUpdated
                        }));
                    } catch (err) {
                        this.error = "Update failed. Using offline data.";
                        const cached = localStorage.getItem(this.storageKey);
                        if (cached) {
                            const parsed = JSON.parse(cached);
                            this.rates = parsed.rates;
                            this.lastUpdated = parsed.lastUpdated;
                        }
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                convert(to) {
                    if (!this.rates || !this.rates[to]) return 0;
                    return this.taxedIdr() * this.rates[to];
                },

                formatCurrency(val, currency) {
                    return new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: currency,
                        minimumFractionDigits: currency === 'IDR' ? 0 : 2,
                    }).format(val);
                },

                getOfficialRate(curr) {
                    if (!this.rates || !this.rates[curr]) return '...';
                    return (1 / this.rates[curr]).toLocaleString('en-US', { maximumFractionDigits: 2 });
                },

                comparison() {
                    if (!this.shopRate || !this.rates || !this.rates[this.selectedShopCurrency]) return null;
                    const officialCurrPerIdr = this.rates[this.selectedShopCurrency];
                    const shopIdrPerCurr = (parseFloat(this.shopRate) || 0) * 1000;
                    const officialIdrPerCurr = 1 / officialCurrPerIdr;
                    
                    const diff = shopIdrPerCurr - officialIdrPerCurr;
                    const percent = (diff / officialIdrPerCurr) * 100;

                    return {
                        percent,
                        isBetter: diff > 0
                    };
                }
            }
        }
    </script>
</body>
</html>
